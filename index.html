<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Speaker Notes" />
<meta name="theme-color" content="#042C53" />
<title>Speaker Notes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #185FA5;
  --accent-light: #E6F1FB;
  --accent-text: #0C447C;
  --warn-light: #FAEEDA;
  --warn-dark: #633806;
  --success: #639922;
  --success-light: #EAF3DE;
  --success-dark: #3B6D11;
  --card-bg: #ffffff;
  --surface: #f5f4f0;
  --border: rgba(0,0,0,0.10);
  --border-mid: rgba(0,0,0,0.18);
  --text: #1a1a18;
  --muted: #5f5e5a;
  --hint: #9a9991;
  --danger: #c53030;
  --danger-light: #fde8e8;
  --radius: 14px;
  --font-display: 'Fraunces', Georgia, serif;
  --font-mono: 'DM Mono', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: dark) {
  :root {
    --card-bg: #1c1c1e;
    --surface: #111110;
    --border: rgba(255,255,255,0.10);
    --border-mid: rgba(255,255,255,0.18);
    --text: #f0ede6;
    --muted: #9a9991;
    --hint: #5f5e5a;
    --accent-light: #0c2c4a;
    --accent-text: #85B7EB;
    --success-light: #1a2f0d;
    --success-dark: #97C459;
    --warn-light: #2e1f04;
    --warn-dark: #FAC775;
    --danger: #fc8181;
    --danger-light: #2d1515;
  }
}

html, body {
  height: 100%;
  background: var(--surface);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  position: relative;
  overflow: hidden;
}

/* Status bar spacer for notch */
.safe-top { height: var(--safe-top); background: var(--card-bg); flex-shrink: 0; }
.safe-bottom { height: var(--safe-bottom); background: var(--card-bg); flex-shrink: 0; }

.status-bar {
  padding: 10px 20px 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  background: var(--card-bg);
  flex-shrink: 0;
}

.nav-bar {
  background: var(--card-bg);
  padding: 6px 20px 12px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.nav-title { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: var(--text); }
.nav-subtitle { font-size: 12px; color: var(--hint); font-family: var(--font-mono); margin-top: 2px; }

.nav-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.btn-back {
  width: 34px; height: 34px; border-radius: 50%;
  border: 0.5px solid var(--border-mid);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--text);
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}

.btn-icon {
  width: 38px; height: 38px; border-radius: 50%;
  border: 0.5px solid var(--border-mid);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--text);
  -webkit-tap-highlight-color: transparent;
}
.btn-icon.accent { background: var(--accent); color: white; border-color: var(--accent); }

.progress-strip {
  padding: 8px 16px 4px;
  display: flex; gap: 10px; align-items: center;
  background: var(--card-bg);
  flex-shrink: 0;
  border-bottom: 0.5px solid var(--border);
}
.progress-bar-wrap { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
.progress-label { font-size: 11px; color: var(--hint); font-family: var(--font-mono); white-space: nowrap; }

.scroll-area {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
  -webkit-overflow-scrolling: touch;
}

.slide-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  overflow: hidden;
  transition: border-color 0.15s;
}
.slide-card.done-card { border-color: #C0DD97; }

.slide-header {
  display: flex; align-items: center;
  padding: 11px 12px 9px; gap: 9px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.slide-num {
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  color: var(--accent-text); background: var(--accent-light);
  border-radius: 6px; padding: 2px 7px; min-width: 28px;
  text-align: center; flex-shrink: 0;
}
.slide-num.done { background: var(--success-light); color: var(--success-dark); }

.slide-title-row { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.slide-title-text { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.slide-timing-row { display: flex; align-items: center; gap: 5px; }

.timing-badge {
  font-family: var(--font-mono); font-size: 10px;
  padding: 1px 6px; border-radius: 5px;
  border: 0.5px solid var(--border-mid);
  color: var(--muted); background: var(--surface);
  white-space: nowrap;
}
.timing-badge.no-time { font-style: italic; opacity: 0.5; }

.slide-actions { display: flex; gap: 4px; flex-shrink: 0; }
.mini-btn {
  padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 500;
  border: 0.5px solid var(--border-mid); background: transparent;
  cursor: pointer; color: var(--muted); font-family: var(--font-mono);
  -webkit-tap-highlight-color: transparent;
}
.mini-btn.done { color: var(--success-dark); border-color: #C0DD97; background: var(--success-light); }
.mini-btn.blue { color: var(--accent-text); border-color: rgba(24,95,165,0.3); background: var(--accent-light); }
.mini-btn.del { color: var(--hint); }

.slide-notes { padding: 0 12px 12px; display: none; }
.slide-notes.open { display: block; }
.notes-text { font-size: 13px; color: var(--muted); line-height: 1.65; white-space: pre-wrap; }

.notes-textarea {
  width: 100%; font-size: 13px; color: var(--text); line-height: 1.65;
  background: var(--surface); border: 0.5px solid var(--border-mid);
  border-radius: 9px; padding: 10px 12px; resize: vertical; min-height: 72px;
  font-family: var(--font-sans); outline: none;
  -webkit-appearance: none;
}
.notes-textarea:focus { border-color: var(--accent); }

.timing-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.timing-label { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
.timing-input {
  width: 56px; font-size: 13px; padding: 6px 8px;
  border: 0.5px solid var(--border-mid); border-radius: 8px;
  background: var(--surface); color: var(--text); outline: none;
  font-family: var(--font-mono); text-align: center;
  -webkit-appearance: none;
}
.timing-input:focus { border-color: var(--accent); }

.edit-title-input {
  width: 100%; font-size: 14px; padding: 8px 10px;
  border: 0.5px solid var(--border-mid); border-radius: 9px;
  background: var(--surface); color: var(--text); outline: none;
  font-family: var(--font-sans); margin-bottom: 8px;
  -webkit-appearance: none;
}
.edit-title-input:focus { border-color: var(--accent); }

.edit-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.btn-save {
  padding: 7px 14px; background: var(--accent); color: white;
  border: none; border-radius: 9px; font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: var(--font-mono);
}
.btn-cancel {
  padding: 7px 14px; background: transparent; color: var(--muted);
  border: 0.5px solid var(--border-mid); border-radius: 9px;
  font-size: 12px; cursor: pointer; font-family: var(--font-mono);
}

.bottom-bar {
  background: var(--card-bg); border-top: 0.5px solid var(--border);
  padding: 12px 14px 14px;
  display: flex; flex-direction: column; gap: 0;
  flex-shrink: 0;
}
.add-slide-row { display: flex; gap: 6px; align-items: center; }
.add-input {
  flex: 1; font-size: 14px; padding: 9px 12px;
  border: 0.5px solid var(--border-mid); border-radius: 11px;
  background: var(--surface); color: var(--text); outline: none;
  font-family: var(--font-sans);
  -webkit-appearance: none;
}
.add-input:focus { border-color: var(--accent); }
.add-input::placeholder { color: var(--hint); }
.add-timing-input {
  width: 52px; font-size: 13px; padding: 9px 6px;
  border: 0.5px solid var(--border-mid); border-radius: 11px;
  background: var(--surface); color: var(--text); outline: none;
  font-family: var(--font-mono); text-align: center;
  -webkit-appearance: none;
}
.add-timing-input:focus { border-color: var(--accent); }
.add-timing-input::placeholder { color: var(--hint); font-size: 11px; }
.add-timing-label { font-size: 11px; color: var(--hint); font-family: var(--font-mono); }
.btn-add {
  padding: 9px 14px; background: var(--accent); color: white;
  border: none; border-radius: 11px; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: var(--font-mono);
  -webkit-tap-highlight-color: transparent;
}

/* ── Home / Deck list view ── */
.app-home { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.app-home.hidden { display: none; }

.deck-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  padding: 14px 14px 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s;
}
.deck-card:active { border-color: var(--accent); }

.deck-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.deck-card-name {
  font-family: var(--font-display); font-size: 17px; font-weight: 500;
  color: var(--text); flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.deck-card-actions { display: flex; gap: 4px; flex-shrink: 0; }

.deck-card-meta {
  display: flex; gap: 10px; margin-top: 6px;
  font-family: var(--font-mono); font-size: 11px; color: var(--hint);
}

.deck-rename-input {
  font-family: var(--font-display); font-size: 17px; font-weight: 500;
  color: var(--text); background: var(--surface);
  border: 0.5px solid var(--accent); border-radius: 8px;
  padding: 2px 8px; outline: none; width: 100%;
  -webkit-appearance: none;
}

.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  padding: 40px 20px; text-align: center;
}
.empty-state-icon { font-size: 40px; opacity: 0.3; }
.empty-state-text { font-size: 15px; color: var(--muted); }
.empty-state-hint { font-size: 12px; color: var(--hint); font-family: var(--font-mono); }

/* ── Normal / Slide editor view ── */
.app-normal { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.app-normal.hidden { display: none; }

/* ── Present view ── */
.present-view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.present-view.active { display: flex; }

.present-safe-top { height: var(--safe-top); background: #031826; flex-shrink: 0; }

.present-header {
  background: #042C53; color: white;
  padding: 10px 16px 10px; display: flex;
  align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.present-header-info { font-family: var(--font-mono); font-size: 11px; color: #85B7EB; }
.present-header-title { font-family: var(--font-display); font-size: 17px; color: white; font-weight: 300; margin-top: 2px; }
.present-exit {
  font-size: 11px; color: #85B7EB; background: transparent;
  border: 0.5px solid #378ADD; border-radius: 8px; padding: 6px 12px;
  cursor: pointer; font-family: var(--font-mono);
  -webkit-tap-highlight-color: transparent;
}

.timer-strip {
  background: #031826; padding: 10px 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.clock-big { font-family: var(--font-mono); font-size: 32px; font-weight: 500; color: white; letter-spacing: 3px; }
.clock-big.warn { color: #FAC775; }
.clock-big.over { color: #F7C1C1; }
.timer-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex: 1; margin: 0 12px; }
.timer-allotted { font-family: var(--font-mono); font-size: 10px; color: #85B7EB; text-align: right; }
.timer-slide-time { font-family: var(--font-mono); font-size: 10px; color: #378ADD; }
.timer-controls { display: flex; gap: 6px; align-items: center; }
.timer-btn {
  padding: 5px 11px; font-size: 11px; font-family: var(--font-mono);
  border-radius: 7px; cursor: pointer; border: 0.5px solid #378ADD;
  background: transparent; color: #85B7EB;
  -webkit-tap-highlight-color: transparent;
}
.timer-btn.running { border-color: #FAC775; color: #FAC775; }

.present-notes-area {
  flex: 1; padding: 20px 18px; overflow-y: auto; background: var(--card-bg);
  -webkit-overflow-scrolling: touch;
}
.present-notes-big {
  font-size: 20px; line-height: 1.75; color: var(--text);
  font-family: var(--font-display); font-weight: 300; white-space: pre-wrap;
}

.present-nav {
  background: var(--card-bg); border-top: 0.5px solid var(--border);
  padding: 12px 16px 16px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.nav-arrow {
  width: 46px; height: 46px; border-radius: 50%;
  border: 0.5px solid var(--border-mid); background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 19px; color: var(--text); flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.nav-arrow:disabled { opacity: 0.3; cursor: default; }
.nav-arrow.accent { background: var(--accent); color: white; border-color: var(--accent); }
.present-prog { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.present-prog-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.present-prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.present-prog-label { font-size: 10px; color: var(--hint); font-family: var(--font-mono); display: flex; justify-content: space-between; }
.done-btn {
  width: 46px; height: 46px; border-radius: 50%;
  border: 0.5px solid #C0DD97; background: var(--success-light);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 17px; color: var(--success-dark); flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}

.present-safe-bottom { height: var(--safe-bottom); background: var(--card-bg); flex-shrink: 0; }

/* ── Sync indicator ── */
.sync-indicator {
  font-size: 18px;
  color: var(--hint);
  cursor: default;
  transition: color 0.2s;
  line-height: 1;
}
.sync-indicator.synced { color: var(--success-dark); }
.sync-indicator.error { color: var(--danger); }
.sync-indicator.syncing {
  color: var(--accent-text);
  display: inline-block;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ── Sync section ── */
.sync-section {
  margin-top: 12px;
  padding: 14px;
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
}
.sync-section-inner {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}
.sync-status-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--hint);
}
.sync-email {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
}
.sync-link-row, .sync-email-row, .sync-signin-row, .sync-signin-email-row {
  display: flex;
  gap: 6px;
  align-items: center;
  width: 100%;
}
.sync-btn {
  padding: 6px 12px;
  font-size: 11px;
  font-family: var(--font-mono);
  border-radius: 8px;
  border: 0.5px solid var(--accent);
  background: var(--accent-light);
  color: var(--accent-text);
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.sync-btn.secondary {
  border-color: var(--border-mid);
  background: transparent;
  color: var(--muted);
}
.sync-email-input {
  flex: 1;
  font-size: 12px;
  padding: 6px 10px;
  border: 0.5px solid var(--border-mid);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  outline: none;
  font-family: var(--font-sans);
  -webkit-appearance: none;
}
.sync-email-input:focus { border-color: var(--accent); }

/* ── Drag and drop ── */
.drag-handle {
  font-size: 14px;
  color: var(--hint);
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  padding: 2px 2px 2px 0;
  flex-shrink: 0;
  letter-spacing: -2px;
}
.drag-handle:active { cursor: grabbing; }
.slide-card.dragging { opacity: 0.3; }
.slide-card.drag-over { border-color: var(--accent); border-style: dashed; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">

  <!-- HOME VIEW (Deck List) -->
  <div class="app-home" id="appHome">
    <div class="safe-top"></div>
    <div class="status-bar">
      <span id="time-display-home">09:41</span>
      <span style="font-size:14px;letter-spacing:2px">···</span>
    </div>
    <div class="nav-bar">
      <div>
        <div class="nav-title">Speaker Notes</div>
        <div class="nav-subtitle" id="home-label">No decks yet</div>
      </div>
      <span class="sync-indicator" id="syncIndicator" title="Offline">&#9729;</span>
    </div>
    <div class="scroll-area" id="deckList"></div>
    <div class="bottom-bar">
      <div class="add-slide-row">
        <input class="add-input" id="newDeckName" placeholder="New deck name…" />
        <button class="btn-add" onclick="createDeck()">+</button>
      </div>
    </div>
    <div class="safe-bottom"></div>
  </div>

  <!-- NORMAL VIEW (Slide Editor) -->
  <div class="app-normal hidden" id="appNormal">
    <div class="safe-top"></div>
    <div class="status-bar">
      <span id="time-display">09:41</span>
      <span style="font-size:14px;letter-spacing:2px">···</span>
    </div>
    <div class="nav-bar">
      <div class="nav-left">
        <button class="btn-back" onclick="closeDeck()">&#8592;</button>
        <div style="min-width:0">
          <div class="nav-title" id="deck-name-title">Deck</div>
          <div class="nav-subtitle" id="deck-label">No slides yet</div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-icon accent" onclick="startPresenting()">&#9654;</button>
      </div>
    </div>
    <div class="progress-strip">
      <div class="progress-bar-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressText">0 / 0 done</span>
    </div>
    <div class="scroll-area" id="slideList"></div>
    <div class="bottom-bar">
      <div class="add-slide-row">
        <input class="add-input" id="newSlideTitle" placeholder="Add slide title…" />
        <input class="add-timing-input" id="newSlideMins" type="number" min="0" placeholder="min" />
        <button class="btn-add" onclick="addSlide()">+</button>
      </div>
    </div>
    <div class="safe-bottom"></div>
  </div>

  <!-- PRESENT VIEW -->
  <div class="present-view" id="presentView">
    <div class="present-safe-top"></div>
    <div class="present-header">
      <div>
        <div class="present-header-info" id="present-slide-counter">Slide 1 of 1</div>
        <div class="present-header-title" id="present-slide-title">—</div>
      </div>
      <button class="present-exit" onclick="exitPresenting()">Exit</button>
    </div>
    <div class="timer-strip">
      <div>
        <div class="clock-big" id="clock-total">00:00</div>
        <div class="timer-slide-time" id="slide-elapsed-label">this slide: 0:00</div>
      </div>
      <div class="timer-meta">
        <div class="timer-allotted" id="allotted-label">no time set</div>
      </div>
      <div class="timer-controls">
        <button class="timer-btn" id="timerToggle" onclick="toggleTimer()">Start</button>
        <button class="timer-btn" onclick="resetTimer()">&#8634;</button>
      </div>
    </div>
    <div class="present-notes-area">

<script>
const STORAGE_KEY_V1 = 'speakernotes_v1';
const STORAGE_KEY = 'speakernotes_v2';

// ── Supabase config ──
const SUPABASE_URL = 'https://trlfbszqlwgveultjili.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KyCyHZ9PgQkarBsy7q8hvg_y_mQsfbo';
let sb = null;
let syncStatus = 'offline';
let currentUserId = null;
let localUpdatedAt = null;
let pushTimer = null;

// ── Multi-deck state ──
let decks = [];
let nextDeckId = 1;
let currentDeckId = null;

// ── Active deck state (loaded from deck object) ──
let slides = [];
let nextId = 1;

// ── Present mode state ──
let presentIndex = 0;
let timerRunning = false;
let totalSeconds = 0;
let slideSeconds = 0;

let timerInterval = null;

// ── Data layer ──

function loadAllDecks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      decks = d.decks || [];
      nextDeckId = d.nextDeckId || (decks.length + 1);
      localUpdatedAt = d.updatedAt || null;
      return;
    }
  } catch(e) {}

  // Migration from v1
  try {
    const rawV1 = localStorage.getItem(STORAGE_KEY_V1);
    if (rawV1) {
      const d = JSON.parse(rawV1);
      const now = new Date().toISOString();
      decks = [{
        id: 1,
        name: 'My Presentation',
        slides: d.slides || [],
        nextSlideId: d.nextId || ((d.slides || []).length + 1),
        createdAt: now,
        updatedAt: now
      }];
      nextDeckId = 2;
      saveAllDecks();
      localStorage.removeItem(STORAGE_KEY_V1);
      return;
    }
  } catch(e) {}

  // Default: start with a sample deck
  const now = new Date().toISOString();
  decks = [{
    id: 1,
    name: 'Example Presentation',
    slides: [
      { id:1, title:"Opening & Agenda",   notes:"Welcome the audience. Briefly outline the three key topics. Keep this under 2 minutes \u2014 energy sets the tone.", mins:2,  done:false },
      { id:2, title:"Problem Statement",  notes:"Anchor the pain point before anything else. Use the operational cost slide to create urgency. Pause after the headline stat.", mins:5,  done:false },
      { id:3, title:"Our Approach",       notes:"Three-engine model: Design, Ops, Quality. These aren\u2019t silos \u2014 they feed each other. Draw the loop on the whiteboard if in-person.", mins:10, done:false },
      { id:4, title:"Roadmap 2025\u201326",    notes:"Keep it high-level. Q1: foundations. Q2: pilots. H2: scale. Avoid getting dragged into specifics \u2014 use the parking lot.", mins:8,  done:false },
      { id:5, title:"Q&A & Next Steps",   notes:"Summarize the three asks: budget approval, pilot team nomination, sponsor meeting before April. Leave at least 10 minutes.", mins:10, done:false }
    ],
    nextSlideId: 6,
    createdAt: now,
    updatedAt: now
  }];
  nextDeckId = 2;
  saveAllDecks();
}

function saveAllDecks() {
  localUpdatedAt = new Date().toISOString();
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ decks, nextDeckId, updatedAt: localUpdatedAt }));
  } catch(e) {}
  schedulePush();
}

function saveDeckData() {
  if (currentDeckId === null) return;
  const deck = decks.find(d => d.id === currentDeckId);
  if (!deck) return;
  deck.slides = slides;
  deck.nextSlideId = nextId;
  deck.updatedAt = new Date().toISOString();
  saveAllDecks();
}

// ── Supabase Cloud Sync ──

function setSyncStatus(status) {
  syncStatus = status;
  renderSyncIndicator();
}

function renderSyncIndicator() {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  switch (syncStatus) {
    case 'syncing':
      el.textContent = '\u21BB';
      el.className = 'sync-indicator syncing';
      el.title = 'Syncing\u2026';
      break;
    case 'synced':
      el.textContent = '\u2601';
      el.className = 'sync-indicator synced';
      el.title = 'Synced';
      break;
    case 'error':
      el.textContent = '\u2601';
      el.className = 'sync-indicator error';
      el.title = 'Sync error';
      break;
    default:
      el.textContent = '\u2601';
      el.className = 'sync-indicator';
      el.title = 'Offline';
  }
}

function schedulePush() {
  if (pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(() => { pushToCloud(); }, 2000);
}

async function initSupabase() {
  if (typeof supabase === 'undefined') return;
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    sb.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) {
        currentUserId = session.user.id;
        renderSyncSection();
        if (event === 'SIGNED_IN') {
          await pullFromCloud();
        }
      }
    });

    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      const { data, error } = await sb.auth.signInAnonymously();
      if (error) { setSyncStatus('error'); return; }
      currentUserId = data.session.user.id;
    } else {
      currentUserId = session.user.id;
    }

    renderSyncSection();
    await pullFromCloud();
  } catch (e) {
    console.error('Supabase init error:', e);
    setSyncStatus('error');
  }
}

async function pullFromCloud() {
  if (!sb || !currentUserId) return;
  setSyncStatus('syncing');
  try {
    const { data, error } = await sb.from('user_data')
      .select('data, updated_at')
      .eq('user_id', currentUserId)
      .single();

    if (error && error.code === 'PGRST116') {
      await pushToCloud();
      return;
    }
    if (error) { setSyncStatus('error'); return; }

    const remoteTime = new Date(data.updated_at).getTime();
    const localTime = localUpdatedAt ? new Date(localUpdatedAt).getTime() : 0;

    if (remoteTime > localTime) {
      const remote = data.data;
      decks = remote.decks || [];
      nextDeckId = remote.nextDeckId || (decks.length + 1);
      localUpdatedAt = data.updated_at;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ decks, nextDeckId, updatedAt: localUpdatedAt }));
      } catch(e) {}
      if (currentDeckId !== null) {
        const deck = decks.find(d => d.id === currentDeckId);
        if (deck) { slides = deck.slides; nextId = deck.nextSlideId; render(); }
        else { closeDeck(); }
      } else {
        renderHome();
      }
      setSyncStatus('synced');
    } else if (localTime > remoteTime) {
      await pushToCloud();
    } else {
      setSyncStatus('synced');
    }
  } catch (e) {
    console.error('Pull error:', e);
    setSyncStatus('error');
  }
}

async function pushToCloud() {
  if (!sb || !currentUserId) return;
  setSyncStatus('syncing');
  try {
    const { error } = await sb.from('user_data')
      .upsert({
        user_id: currentUserId,
        data: { decks, nextDeckId },
        updated_at: localUpdatedAt || new Date().toISOString()
      }, { onConflict: 'user_id' });

    if (error) { setSyncStatus('error'); return; }
    setSyncStatus('synced');
  } catch (e) {
    console.error('Push error:', e);
    setSyncStatus('error');
  }
}

// ── Email auth for cross-device sync ──

          '<div class="sync-email-row" id="syncEmailRow" style="display:none">' +

// ── Drag and drop (slide reorder) ──

let dragSrcIndex = null;
let touchDragState = null;

function onDragStart(e, i) {
  dragSrcIndex = i;
  e.dataTransfer.effectAllowed = 'move';
  e.target.closest('.slide-card').classList.add('dragging');
}

function onDragOver(e, i) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const cards = document.querySelectorAll('#slideList .slide-card');
  cards.forEach(c => c.classList.remove('drag-over'));
  e.target.closest('.slide-card')?.classList.add('drag-over');
}

function onDrop(e, i) {
  e.preventDefault();
  if (dragSrcIndex === null || dragSrcIndex === i) return;
  const [moved] = slides.splice(dragSrcIndex, 1);
  slides.splice(i, 0, moved);
  dragSrcIndex = null;
  saveDeckData();
  render();
}

function onDragEnd(e) {
  document.querySelectorAll('#slideList .slide-card').forEach(c => {
    c.classList.remove('dragging', 'drag-over');
    c.draggable = false;
  });
  dragSrcIndex = null;
}

function initTouchDrag(e, index) {
  e.preventDefault();
  const touch = e.touches[0];
  const card = e.target.closest('.slide-card');
  const rect = card.getBoundingClientRect();
  const list = document.getElementById('slideList');
  const cards = Array.from(list.querySelectorAll('.slide-card'));

  const ghost = card.cloneNode(true);
  ghost.style.cssText = 'position:fixed;width:' + rect.width + 'px;left:' + rect.left +
    'px;top:' + (touch.clientY - (touch.clientY - rect.top)) +
    'px;z-index:1000;opacity:0.9;box-shadow:0 4px 20px rgba(0,0,0,0.18);pointer-events:none;transition:none;';
  document.body.appendChild(ghost);
  card.classList.add('dragging');

  touchDragState = {
    srcIndex: index,
    currentIndex: index,
    offsetY: touch.clientY - rect.top,
    ghost: ghost,
    srcCard: card,
    cards: cards
  };

  document.addEventListener('touchmove', onTouchDragMove, { passive: false });
  document.addEventListener('touchend', onTouchDragEnd);
}

function onTouchDragMove(e) {
  if (!touchDragState) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchDragState.ghost.style.top = (touch.clientY - touchDragState.offsetY) + 'px';

  touchDragState.cards.forEach((c, i) => {
    c.classList.remove('drag-over');
    const r = c.getBoundingClientRect();
    if (touch.clientY > r.top && touch.clientY < r.bottom && i !== touchDragState.srcIndex) {
      c.classList.add('drag-over');
      touchDragState.currentIndex = i;
    }
  });
}

function onTouchDragEnd() {
  if (!touchDragState) return;
  touchDragState.ghost.remove();
  touchDragState.srcCard.classList.remove('dragging');
  touchDragState.cards.forEach(c => c.classList.remove('drag-over'));

  const src = touchDragState.srcIndex;
  const dst = touchDragState.currentIndex;
  if (src !== dst) {
    const [moved] = slides.splice(src, 1);
    slides.splice(dst, 0, moved);
    saveDeckData();
    render();
  }

  touchDragState = null;
  document.removeEventListener('touchmove', onTouchDragMove);
  document.removeEventListener('touchend', onTouchDragEnd);
}

// ── Deck management ──

function createDeck() {
  const input = document.getElementById('newDeckName');
  const name = input.value.trim();
  if (!name) return;
  const now = new Date().toISOString();
  decks.push({
    id: nextDeckId++,
    name,
    slides: [],
    nextSlideId: 1,
    createdAt: now,
    updatedAt: now
  });
  input.value = '';
  saveAllDecks();
  renderHome();
}

function openDeck(id) {
  const deck = decks.find(d => d.id === id);
  if (!deck) return;
  currentDeckId = id;
  slides = deck.slides;
  nextId = deck.nextSlideId;
  document.getElementById('appHome').classList.add('hidden');
  document.getElementById('appNormal').classList.remove('hidden');
  document.getElementById('deck-name-title').textContent = deck.name;
  render();
}

function closeDeck() {
  saveDeckData();
  currentDeckId = null;
  slides = [];
  nextId = 1;
  document.getElementById('appNormal').classList.add('hidden');
  document.getElementById('appHome').classList.remove('hidden');
  renderHome();
}

function renameDeck(id, el, ev) {
  ev.stopPropagation();
  const deck = decks.find(d => d.id === id);
  if (!deck) return;
  const cardEl = el.closest('.deck-card');
  const nameEl = cardEl.querySelector('.deck-card-name');
  const oldName = deck.name;
  let cancelled = false;

  nameEl.innerHTML = '<input class="deck-rename-input" id="rename-' + id + '" value="' + escapeHtml(oldName) + '" />';
  const inp = document.getElementById('rename-' + id);
  inp.focus();
  inp.select();

  function finish() {
    if (cancelled) { renderHome(); return; }
    const newName = inp.value.trim() || oldName;
    deck.name = newName;
    deck.updatedAt = new Date().toISOString();
    saveAllDecks();
    renderHome();
  }

  inp.addEventListener('blur', finish);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') { cancelled = true; inp.blur(); }
  });
}

function deleteDeck(id, ev) {
  ev.stopPropagation();
  const deck = decks.find(d => d.id === id);
  if (!deck) return;
  if (!confirm('Delete "' + deck.name + '"? This cannot be undone.')) return;
  decks = decks.filter(d => d.id !== id);
  saveAllDecks();
  renderHome();
}

function formatRelativeTime(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  return new Date(isoStr).toLocaleDateString();
}

function renderHome() {
  const list = document.getElementById('deckList');
  const count = decks.length;
  document.getElementById('home-label').textContent = count
    ? count + ' deck' + (count !== 1 ? 's' : '')
    : 'No decks yet';

  list.innerHTML = '';

  if (!count) {
    list.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-state-icon">\uD83C\uDFA4</div>' +
        '<div class="empty-state-text">No decks yet</div>' +
        '<div class="empty-state-hint">Create your first deck below</div>' +
      '</div>';
  } else {
    decks.forEach(deck => {
      const slideCount = deck.slides.length;
      const totalMins = deck.slides.reduce((a, s) => a + (s.mins || 0), 0);
      const doneCount = deck.slides.filter(s => s.done).length;
      const card = document.createElement('div');
      card.className = 'deck-card';
      card.onclick = () => openDeck(deck.id);
      card.innerHTML =
        '<div class="deck-card-top">' +
          '<span class="deck-card-name">' + escapeHtml(deck.name) + '</span>' +
          '<div class="deck-card-actions">' +
            '<button class="mini-btn blue" onclick="renameDeck(' + deck.id + ', this, event)">rename</button>' +
            '<button class="mini-btn del" onclick="deleteDeck(' + deck.id + ', event)">\u2715</button>' +
          '</div>' +
        '</div>' +
        '<div class="deck-card-meta">' +
          '<span>' + slideCount + ' slide' + (slideCount !== 1 ? 's' : '') + (totalMins ? ' \u00B7 ' + totalMins + ' min' : '') + '</span>' +
          (doneCount ? '<span>' + doneCount + '/' + slideCount + ' done</span>' : '') +
          '<span>' + formatRelativeTime(deck.updatedAt) + '</span>' +
        '</div>';
      list.appendChild(card);
    });
  }

  // Sync section
  const syncDiv = document.createElement('div');
  syncDiv.className = 'sync-section';
  syncDiv.id = 'syncSection';
  list.appendChild(syncDiv);
  renderSyncSection();
}

// ── Slide editor (largely unchanged) ──

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(s) {
  const m = Math.floor(s/60), sec = s%60;
  return m + ':' + String(sec).padStart(2,'0');
}

function render() {
  const list = document.getElementById('slideList');
  const done = slides.filter(s => s.done).length;
  const total = slides.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const totalMins = slides.reduce((a,s) => a + (s.mins||0), 0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' done';
  document.getElementById('deck-label').textContent = total
    ? total + ' slides \u00B7 ' + totalMins + ' min total'
    : 'No slides yet';

  list.innerHTML = '';
  slides.forEach((slide, i) => {
    const card = document.createElement('div');
    card.className = 'slide-card' + (slide.done ? ' done-card' : '');
    const numClass = slide.done ? 'done' : '';
    const timingHtml = slide.mins
      ? '<span class="timing-badge">' + slide.mins + ' min</span>'
      : '<span class="timing-badge no-time">no time set</span>';
    const notesPreview = slide.notes
      ? '<div class="notes-text">' + escapeHtml(slide.notes) + '</div>'
      : '<div class="notes-text" style="color:var(--hint);font-style:italic">No notes. Tap edit to add.</div>';

    card.innerHTML =
      '<div class="slide-header" onclick="toggleNotes(' + slide.id + ')">' +
        '<span class="drag-handle" onclick="event.stopPropagation()">\u22EE\u22EE</span>' +
        '<span class="slide-num ' + numClass + '">' + String(i+1).padStart(2,'0') + '</span>' +
        '<div class="slide-title-row">' +
          '<span class="slide-title-text">' + escapeHtml(slide.title) + '</span>' +
          '<div class="slide-timing-row">' + timingHtml + '</div>' +
        '</div>' +
        '<div class="slide-actions" onclick="event.stopPropagation()">' +
          '<button class="mini-btn ' + (slide.done?'done':'') + '" onclick="toggleDone(' + slide.id + ')">' + (slide.done?'\u2713':'done') + '</button>' +
          '<button class="mini-btn blue" onclick="editSlide(' + slide.id + ')">edit</button>' +
          '<button class="mini-btn del" onclick="deleteSlide(' + slide.id + ')">\u2715</button>' +
        '</div>' +
      '</div>' +
      '<div class="slide-notes" id="notes-' + slide.id + '">' + notesPreview + '</div>';

    // Desktop drag-and-drop
    const handle = card.querySelector('.drag-handle');
    handle.addEventListener('mousedown', () => { card.draggable = true; });
    card.addEventListener('dragstart', (e) => onDragStart(e, i));
    card.addEventListener('dragover', (e) => onDragOver(e, i));
    card.addEventListener('drop', (e) => onDrop(e, i));
    card.addEventListener('dragend', onDragEnd);
    // Touch drag-and-drop
    handle.addEventListener('touchstart', (e) => initTouchDrag(e, i), { passive: false });

    list.appendChild(card);
  });
}

function toggleNotes(id) {
  document.getElementById('notes-'+id).classList.toggle('open');
}
function toggleDone(id) {
  const s = slides.find(s=>s.id===id); if(s) s.done=!s.done; saveDeckData(); render();
}
function deleteSlide(id) {
  if (!confirm('Delete this slide?')) return;
  slides = slides.filter(s=>s.id!==id); saveDeckData(); render();
}

function editSlide(id) {
  const s = slides.find(s=>s.id===id); if(!s) return;
  const n = document.getElementById('notes-'+id);
  n.classList.add('open');
  n.innerHTML =
    '<input class="edit-title-input" id="et-' + id + '" value="' + escapeHtml(s.title) + '" />' +
    '<div class="timing-input-row">' +
      '<span class="timing-label">Allotted time:</span>' +
      '<input class="timing-input" id="em-' + id + '" type="number" min="0" value="' + (s.mins||'') + '" placeholder="\u2014" />' +
      '<span class="timing-label">min</span>' +
    '</div>' +
    '<textarea class="notes-textarea" id="en-' + id + '">' + escapeHtml(s.notes) + '</textarea>' +
    '<div class="edit-actions">' +
      '<button class="btn-cancel" onclick="render()">Cancel</button>' +
      '<button class="btn-save" onclick="saveEdit(' + id + ')">Save</button>' +
    '</div>';
}

function saveEdit(id) {
  const s = slides.find(s=>s.id===id); if(!s) return;
  s.title = document.getElementById('et-'+id).value.trim() || s.title;
  s.notes = document.getElementById('en-'+id).value;
  const mv = parseInt(document.getElementById('em-'+id).value);
  s.mins = isNaN(mv) ? 0 : Math.max(0,mv);
  saveDeckData(); render();
  setTimeout(() => { const n = document.getElementById('notes-'+id); if(n) n.classList.add('open'); }, 50);
}

function addSlide() {
  const title = document.getElementById('newSlideTitle').value.trim();
  if (!title) return;
  const mv = parseInt(document.getElementById('newSlideMins').value);
  slides.push({ id: nextId++, title, notes:'', mins: isNaN(mv)?0:Math.max(0,mv), done:false });
  document.getElementById('newSlideTitle').value = '';
  document.getElementById('newSlideMins').value = '';
  saveDeckData(); render();
}

// ── Present mode ──

function updateClock() {
  if (!timerRunning) return;
  totalSeconds++;
  slideSeconds = totalSeconds - slideStartAt;
  renderTimerUI();
}

function renderTimerUI() {
  const s = slides[presentIndex];
  const allottedSec = s && s.mins ? s.mins * 60 : 0;
  const clockEl = document.getElementById('clock-total');
  const m = Math.floor(totalSeconds/60), sec = totalSeconds%60;
  clockEl.textContent = String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  clockEl.className = 'clock-big';
  if (allottedSec && slideSeconds > allottedSec) clockEl.className = 'clock-big over';
  else if (allottedSec && slideSeconds > allottedSec * 0.8) clockEl.className = 'clock-big warn';
  document.getElementById('slide-elapsed-label').textContent = 'this slide: ' + fmtTime(slideSeconds);
  if (s && s.mins) {
    const remaining = allottedSec - slideSeconds;
    const sign = remaining < 0 ? '-' : '';
    document.getElementById('allotted-label').textContent =
      s.mins + ' min allotted \u00B7 ' + sign + fmtTime(Math.abs(remaining)) + (remaining < 0 ? ' over' : ' left');
  } else {
    document.getElementById('allotted-label').textContent = 'no time set for this slide';
  }
}

function toggleTimer() {
  timerRunning = !timerRunning;
  const btn = document.getElementById('timerToggle');
  if (timerRunning) {
    btn.textContent = 'Pause'; btn.className = 'timer-btn running';
    timerInterval = setInterval(updateClock, 1000);
  } else {
    btn.textContent = 'Resume'; btn.className = 'timer-btn';
    clearInterval(timerInterval);
  }
}

function resetTimer() {
  clearInterval(timerInterval); timerRunning = false;
  totalSeconds = 0; slideSeconds = 0; slideStartAt = 0;
  timerInterval = null;
  document.getElementById('timerToggle').textContent = 'Start';
  document.getElementById('timerToggle').className = 'timer-btn';
  document.getElementById('clock-total').textContent = '00:00';
  document.getElementById('clock-total').className = 'clock-big';
  document.getElementById('slide-elapsed-label').textContent = 'this slide: 0:00';
  renderTimerUI();
}

function startPresenting() {
  if (!slides.length) return;
  presentIndex = 0; slideStartAt = 0; slideSeconds = 0;
  updatePresentView();
  document.getElementById('appNormal').classList.add('hidden');
  document.getElementById('presentView').classList.add('active');
  renderTimerUI();
}

function exitPresenting() {
  clearInterval(timerInterval); timerRunning = false; timerInterval = null;
  document.getElementById('timerToggle').textContent = 'Start';
  document.getElementById('timerToggle').className = 'timer-btn';
  document.getElementById('appNormal').classList.remove('hidden');
  document.getElementById('presentView').classList.remove('active');
  render();
}

function updatePresentView() {
  const s = slides[presentIndex];
  const total = slides.length;
  const done = slides.filter(s=>s.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('present-slide-counter').textContent = 'Slide '+(presentIndex+1)+' of '+total;
  document.getElementById('present-slide-title').textContent = s.title;
  document.getElementById('present-notes-content').textContent = s.notes || 'No notes for this slide.';
  document.getElementById('presentProgFill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'% done';
  document.getElementById('prog-done').textContent = done+' done';
  document.getElementById('btn-prev').disabled = presentIndex===0;
  document.getElementById('btn-next').disabled = presentIndex===total-1;
  renderTimerUI();
}

function presentPrev() {
  if (presentIndex>0) { presentIndex--; slideStartAt=totalSeconds; slideSeconds=0; updatePresentView(); }
}
function presentNext() {
  if (presentIndex<slides.length-1) { presentIndex++; slideStartAt=totalSeconds; slideSeconds=0; updatePresentView(); }
}
function markCurrentDone() {
  slides[presentIndex].done = !slides[presentIndex].done; saveDeckData(); updatePresentView();
}

// Swipe navigation in present mode
let touchStartX = 0;
document.getElementById('presentView').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('presentView').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) { dx < 0 ? presentNext() : presentPrev(); }
}, { passive: true });

// ── Clock ──

function updateTime() {
  const d = new Date();
  const t = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  const el1 = document.getElementById('time-display-home');
  const el2 = document.getElementById('time-display');
  if (el1) el1.textContent = t;
  if (el2) el2.textContent = t;
}

// ── Keyboard shortcuts ──

document.getElementById('newDeckName').addEventListener('keydown', e => { if(e.key==='Enter') createDeck(); });
document.getElementById('newSlideTitle').addEventListener('keydown', e => { if(e.key==='Enter') addSlide(); });

// ── Init ──

loadAllDecks();
updateTime();
setInterval(updateTime, 15000);
renderHome();
initSupabase();
</script>
</body>
</html>
